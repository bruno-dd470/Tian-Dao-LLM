[pytest]
# Ajoute la racine du projet au PYTHONPATH pour les imports
pythonpath = .

# Configuration des tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore les warnings de matplotlib (dépréciations inoffensives)
filterwarnings =
    ignore::DeprecationWarning:matplotlib.*
    ignore::DeprecationWarning:pyparsing.*

# Affichage plus verbeux par défaut
addopts = -v --tb=short
